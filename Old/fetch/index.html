<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NN Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; }
        #viz { background: white; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }
        .node { stroke: #333; stroke-width: 2px; fill: white; }
        .link { stroke-opacity: 0.6; }
        #info { margin: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>NN学習プロセス可視化 (CSR構成)</h1>
    <div id="info">
        Epoch: <span id="epoch">0</span> | Loss: <span id="loss">0.000</span>
    </div>
    <svg id="viz" width="600" height="400"></svg>
    
    <!-- 描画ロジックの読み込み -->
    <script src="/static/script.js"></script>
</body>
</html>
