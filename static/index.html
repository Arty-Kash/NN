<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NN Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f9; }
        
        /* アプリ全体を囲むコンテナ：左右分割 */
        #app-container {
            display: flex;
            width: 100%;
            min-height: 900px; /* 全体を大きく設定 */
        }

        /* 左エリア */
        #left-area {
            flex: 1;
        }

        /* 右半分を管理するコンテナ：上下分割 */
        #right-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 右上エリア */
        #right-top-area {
         /* flex: 1; */
            height: 500px;
        }

        /* 右下エリア：ここにNNを描画 */
        #right-bottom-area {
            flex: 1;
            text-align: center;
        }

        #viz { background: white; border: 1px solid #ccc; border-radius: 8px; }
        .node { stroke: #333; stroke-width: 2px; fill: white; }
        .link { stroke-opacity: 0.6; }
        #info { margin: 5px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- 左エリア -->
        <div id="left-area"></div>

        <!-- 右半分のコンテナ -->
        <div id="right-container">
            <!-- 右上エリア -->
            <div id="right-top-area"></div>

            <!-- 右下エリア -->
            <div id="right-bottom-area">
                <div id="info-header">  <!--タイトルとepochなどを1行に-->
                    <span style="font-weight: bold; margin-right: 15px;">NN学習プロセス可視化</span>
                    Epoch: <span id="epoch">0</span> | Loss: <span id="loss">0.000</span>
                </div>
                <!--
                <h3>NN学習プロセス可視化</h3>
                <div id="info">
                    Epoch: <span id="epoch">0</span> | Loss: <span id="loss">0.000</span>
                </div>
                -->
                <svg id="viz" width="600" height="400"></svg>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
